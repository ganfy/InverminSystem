repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff              # linter (detecta errores, imports sin usar, etc.)
        args: [--fix]         # corrige automáticamente lo que puede
      - id: ruff-format       # formateador (reemplaza black)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace     # elimina espacios al final de línea
      - id: end-of-file-fixer       # asegura newline al final del archivo
      - id: check-merge-conflict    # detecta marcadores de conflicto git
      - id: check-yaml              # valida sintaxis YAML
      - id: debug-statements        # detecta print() / breakpoint() olvidados
